<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 32px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #4b5563; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; }
      .panel-soft { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; }
      .smallbox { fill: #ffffff; stroke: #64748b; stroke-width: 1.2; }
      .thinbox { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.0; }
      .header-text { font: 700 20px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .header-dark { font: 700 20px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .section-text { font: 700 17px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .body { font: 400 15px Arial, Helvetica, sans-serif; fill: #263238; letter-spacing: 0; }
      .body-small { font: 400 13px Arial, Helvetica, sans-serif; fill: #374151; letter-spacing: 0; }
      .mono { font: 400 13px "DejaVu Sans Mono", Consolas, monospace; fill: #111827; letter-spacing: 0; }
      .mono-small { font: 400 12px "DejaVu Sans Mono", Consolas, monospace; fill: #1f2937; letter-spacing: 0; }
      .tag { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: .2px; }
      .note { font: 700 13px Arial, Helvetica, sans-serif; fill: #334155; letter-spacing: .2px; }
      .arrow { fill: none; stroke: #111827; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #475569; stroke-width: 1.8; marker-end: url(#arrowSoft); }
      .arrow-dash { fill: none; stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 7 6; marker-end: url(#arrowSoft); }
      .tactical { fill: #176b73; }
      .planner { fill: #245c9c; }
      .control { fill: #2f6f4e; }
      .rl { fill: #b55d17; }
      .context { fill: #475569; }
      .feedback { fill: #374151; }
      .chip-tac { fill: #e8f5f6; stroke: #176b73; stroke-width: 1; }
      .chip-plan { fill: #eaf1fb; stroke: #245c9c; stroke-width: 1; }
      .chip-ctrl { fill: #eaf5ee; stroke: #2f6f4e; stroke-width: 1; }
      .chip-rl { fill: #fff3e8; stroke: #b55d17; stroke-width: 1; }
      .chip-text { font: 700 12px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111827"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1080"/>
  <text class="title" x="70" y="55">Hierarchical A2RL Tactical--SOCP--MPCC Algorithmic Software Stack</text>
  <text class="subtitle" x="70" y="84">Closed-loop ROS2 pipeline: tactical intent is encoded as a Frenet corridor, optimized by SOCP trajectory planning, and tracked by nonlinear MPCC.</text>

  <!-- Context panel -->
  <g>
    <rect class="panel" x="60" y="126" width="255" height="542"/>
    <rect x="60" y="126" width="255" height="44" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.4"/>
  </g>
  <text class="header-dark" x="82" y="154">State and Context</text>

  <rect class="smallbox" x="82" y="196" width="211" height="66"/>
  <text class="section-text" x="100" y="220">Observer states</text>
  <text class="mono-small" x="100" y="242">/observer/ego_loc</text>
  <text class="mono-small" x="100" y="258">/observer/ego_state</text>

  <rect class="smallbox" x="82" y="282" width="211" height="66"/>
  <text class="section-text" x="100" y="306">Opponent stream</text>
  <text class="mono-small" x="100" y="328">/v2v_ground_truth</text>
  <text class="body-small" x="100" y="344">Frenet projection in planner</text>

  <rect class="smallbox" x="82" y="368" width="211" height="66"/>
  <text class="section-text" x="100" y="392">Track resources</text>
  <text class="body-small" x="100" y="414">BaseLine, RaceLine, bounds</text>
  <text class="mono-small" x="100" y="430">Sref, Kref, Lmin/Lmax</text>

  <rect class="smallbox" x="82" y="454" width="211" height="66"/>
  <text class="section-text" x="100" y="478">Race control</text>
  <text class="body-small" x="100" y="500">flags, P2P permission</text>
  <text class="body-small" x="100" y="516">safety and timing gates</text>

  <rect class="panel-soft" x="82" y="548" width="211" height="86"/>
  <text class="note" x="100" y="572">Common coordinates</text>
  <text class="body-small" x="100" y="596">Frenet state: s, n, chi</text>
  <text class="body-small" x="100" y="614">Track-wrapped horizon: 300 m</text>

  <!-- RL policy block -->
  <g>
    <rect class="panel" x="360" y="126" width="455" height="118"/>
    <rect x="360" y="126" width="455" height="38" rx="8" fill="#fff3e8" stroke="#b55d17" stroke-width="1.4"/>
  </g>
  <text class="header-dark" x="382" y="151">Optional SAC Tactical Brain</text>
  <text class="body" x="383" y="188">28-d Frenet observation, 9-d action, dense overtake reward.</text>
  <text class="mono" x="383" y="214">/tactical/state -> rl/a2rl_env.py -> /tactical/rl_action</text>
  <rect class="chip-rl" x="647" y="137" width="142" height="20"/>
  <text class="chip-text" x="659" y="151">corridor tuning</text>

  <!-- Tactical panel -->
  <g>
    <rect class="panel" x="360" y="286" width="405" height="382"/>
    <rect x="360" y="286" width="405" height="44" rx="8" fill="#e8f5f6" stroke="#176b73" stroke-width="1.4"/>
  </g>
  <text class="header-dark" x="382" y="314">Tactical Decision Node</text>

  <rect class="thinbox" x="383" y="352" width="359" height="54"/>
  <text class="section-text" x="401" y="374">Observation assembly</text>
  <text class="mono-small" x="401" y="393">build_observation(): ego, opponents, curvature preview</text>

  <rect class="thinbox" x="383" y="424" width="359" height="76"/>
  <text class="section-text" x="401" y="446">Stateful tactical FSM</text>
  <text class="mono-small" x="401" y="465">HeuristicTacticalPolicy.act(obs)</text>
  <g>
    <rect class="chip-tac" x="402" y="476" width="70" height="20"/><text class="chip-text" x="412" y="490">RACE</text>
    <rect class="chip-tac" x="480" y="476" width="83" height="20"/><text class="chip-text" x="489" y="490">SHADOW</text>
    <rect class="chip-tac" x="571" y="476" width="94" height="20"/><text class="chip-text" x="580" y="490">OVERTAKE</text>
    <rect class="chip-tac" x="673" y="476" width="52" height="20"/><text class="chip-text" x="684" y="490">HOLD</text>
  </g>

  <rect class="thinbox" x="383" y="518" width="359" height="92"/>
  <text class="section-text" x="401" y="540">Obstacle-aware corridor carver</text>
  <text class="mono-small" x="401" y="560">A2RLObstacleCarver.construct_guidance()</text>
  <text class="body-small" x="401" y="581">Mode-specific corridor, ego reachability, EMA smoothing</text>
  <text class="mono-small" x="401" y="601">C = {s_i, n_i^- &lt;= n_i &lt;= n_i^+}</text>

  <rect class="panel-soft" x="383" y="626" width="359" height="28"/>
  <text class="mono-small" x="402" y="643">publishes guidance: mode, S, Lmax, Lmin, P2P</text>

  <!-- Planner panel -->
  <g>
    <rect class="panel" x="830" y="286" width="455" height="382"/>
    <rect x="830" y="286" width="455" height="44" rx="8" fill="#eaf1fb" stroke="#245c9c" stroke-width="1.4"/>
  </g>
  <text class="header-dark" x="852" y="314">SOCP Trajectory Planner</text>

  <rect class="thinbox" x="854" y="352" width="407" height="52"/>
  <text class="section-text" x="872" y="374">Corridor override and horizon build</text>
  <text class="mono-small" x="872" y="393">setCorridorOverride(); TrajOptLocal()</text>

  <rect class="thinbox" x="854" y="421" width="407" height="76"/>
  <text class="section-text" x="872" y="443">Path SOCP in Frenet frame</text>
  <text class="mono-small" x="872" y="462">PathOptLocal(): ECOS cone solver</text>
  <text class="body-small" x="872" y="482">Intersect tactical corridor with track bounds; solve for n(s), psi(s)</text>

  <rect class="thinbox" x="854" y="514" width="407" height="76"/>
  <text class="section-text" x="872" y="536">Velocity profile under GGV envelope</text>
  <text class="mono-small" x="872" y="555">VelOptLocalR() or VelOptForwardBackward()</text>
  <text class="body-small" x="872" y="575">Longitudinal ramping and lateral acceleration limits from V-An-Aw tables</text>

  <rect class="panel-soft" x="854" y="608" width="407" height="44"/>
  <text class="mono-small" x="873" y="627">ReferencePath: 30 points, dt=0.125 s</text>
  <text class="mono-small" x="873" y="644">x, y, yaw, kappa, v, t -> trajectory topic</text>

  <!-- Control panel -->
  <g>
    <rect class="panel" x="1350" y="286" width="390" height="382"/>
    <rect x="1350" y="286" width="390" height="44" rx="8" fill="#eaf5ee" stroke="#2f6f4e" stroke-width="1.4"/>
  </g>
  <text class="header-dark" x="1372" y="314">MPCC Controller</text>

  <rect class="thinbox" x="1374" y="352" width="342" height="58"/>
  <text class="section-text" x="1392" y="374">Reference preprocessing</text>
  <text class="mono-small" x="1392" y="393">reference_path_callback(); runMPCC()</text>
  <text class="body-small" x="1392" y="407">Global path -> body frame, v_ref clamp</text>

  <rect class="thinbox" x="1374" y="428" width="342" height="96"/>
  <text class="section-text" x="1392" y="450">Nonlinear MPCC NLP</text>
  <text class="mono-small" x="1392" y="469">NMPCC::solve(): CasADi + IPOPT</text>
  <text class="body-small" x="1392" y="489">Dynamic single-track model, RK4 shooting</text>
  <text class="body-small" x="1392" y="508">Cost: e_lat, e_yaw, e_vel, progress, input smoothing</text>

  <rect class="thinbox" x="1374" y="542" width="342" height="68"/>
  <text class="section-text" x="1392" y="564">Actuation mapping</text>
  <text class="body-small" x="1392" y="584">First control: a_cmd, delta_cmd</text>
  <text class="mono-small" x="1392" y="602">steer, throttle, brake -> HL_Msg_01/02</text>

  <rect class="panel-soft" x="1374" y="628" width="342" height="24"/>
  <text class="mono-small" x="1393" y="645">fallback: PID longitudinal + NMPC1 lateral</text>

  <!-- Main arrows -->
  <path class="arrow-soft" d="M315 390 C335 390, 335 380, 360 380"/>
  <text class="body-small" x="305" y="344">ego/opponent Frenet state</text>

  <path class="arrow-dash" d="M585 244 C585 262, 585 268, 585 286"/>
  <text class="body-small" x="604" y="266">fresh RL action</text>

  <path class="arrow" d="M765 476 L830 476"/>
  <rect class="chip-tac" x="776" y="444" width="50" height="38"/>
  <text class="chip-text" x="784" y="459">corr.</text>
  <text class="mono-small" x="783" y="475">C(s)</text>

  <path class="arrow" d="M1285 476 L1350 476"/>
  <rect class="chip-plan" x="1292" y="444" width="54" height="38"/>
  <text class="chip-text" x="1300" y="459">ref.</text>
  <text class="mono-small" x="1298" y="475">path</text>

  <!-- Small formulation strip -->
  <g>
    <rect class="panel" x="360" y="704" width="1380" height="108"/>
  </g>
  <rect class="feedback" x="360" y="704" width="1380" height="34" rx="8"/>
  <text class="header-text" x="383" y="728">Optimization Interfaces</text>

  <rect class="thinbox" x="383" y="754" width="312" height="42"/>
  <text class="mono-small" x="399" y="773">Tactical output:</text>
  <text class="mono-small" x="399" y="790">C_i=[n_min(s_i), n_max(s_i)]</text>

  <rect class="thinbox" x="719" y="754" width="410" height="42"/>
  <text class="mono-small" x="736" y="773">SOCP path/velocity:</text>
  <text class="mono-small" x="736" y="790">min c'z, s.t. Az=b, Gz+h in K, |a| within GGV(V)</text>

  <rect class="thinbox" x="1154" y="754" width="560" height="42"/>
  <text class="mono-small" x="1171" y="773">MPCC:</text>
  <text class="mono-small" x="1171" y="790">x_{k+1}=f_RK4(x_k,u_k); soft friction-circle inequality</text>

  <!-- Feedback loop panel -->
  <g>
    <rect class="panel" x="60" y="850" width="1680" height="160"/>
    <rect class="feedback" x="60" y="850" width="1680" height="38" rx="8"/>
  </g>
  <text class="header-text" x="82" y="876">Closed-Loop Execution and Safety Feedback</text>

  <rect class="smallbox" x="90" y="914" width="290" height="60"/>
  <text class="section-text" x="112" y="938">Vehicle and simulator</text>
  <text class="body-small" x="112" y="960">EAV24 CAN actuation, AVRS dynamics</text>

  <rect class="smallbox" x="430" y="914" width="310" height="60"/>
  <text class="section-text" x="452" y="938">Observer and perception</text>
  <text class="body-small" x="452" y="960">Localization, ego dynamics, V2V opponents</text>

  <rect class="smallbox" x="790" y="914" width="350" height="60"/>
  <text class="section-text" x="812" y="938">Planner feedback publisher</text>
  <text class="mono-small" x="812" y="958">/tactical/state: ego_s, ego_n, chi, opponents</text>

  <rect class="smallbox" x="1190" y="914" width="235" height="60"/>
  <text class="section-text" x="1212" y="938">Health gates</text>
  <text class="body-small" x="1212" y="960">timeouts, NaN checks, safe stop</text>

  <rect class="smallbox" x="1470" y="914" width="235" height="60"/>
  <text class="section-text" x="1492" y="938">Debug outputs</text>
  <text class="body-small" x="1492" y="960">status, markers, predicted paths</text>

  <path class="arrow" d="M1545 668 C1685 730, 1732 812, 1724 984 L235 984 L235 974"/>
  <text class="mono-small" x="1280" y="996">steer/throttle/brake commands</text>
  <path class="arrow-soft" d="M380 944 L430 944"/>
  <path class="arrow-soft" d="M740 944 L790 944"/>
  <path class="arrow-soft" d="M965 914 C965 828, 610 828, 610 668"/>
  <text class="mono-small" x="690" y="836">feedback to tactical</text>
  <path class="arrow-soft" d="M965 914 C965 840, 1058 814, 1058 668"/>
  <text class="mono-small" x="1070" y="836">feedback to planner</text>
  <path class="arrow-soft" d="M585 914 C585 800, 1520 800, 1520 668"/>
  <text class="mono-small" x="1430" y="836">feedback to MPCC</text>

  <!-- Track and corridor inset -->
  <g transform="translate(78 690)">
    <rect class="panel-soft" x="0" y="0" width="250" height="122"/>
    <text class="note" x="18" y="24">Frenet corridor concept</text>
    <path d="M20 84 C64 35, 116 34, 160 70 C184 90, 211 86, 230 54" fill="none" stroke="#94a3b8" stroke-width="12" stroke-linecap="round" opacity="0.55"/>
    <path d="M20 84 C64 35, 116 34, 160 70 C184 90, 211 86, 230 54" fill="none" stroke="#245c9c" stroke-width="3" stroke-linecap="round"/>
    <path d="M22 105 C66 56, 115 55, 156 91 C182 113, 218 108, 238 74" fill="none" stroke="#b55d17" stroke-width="2" stroke-dasharray="6 5"/>
    <path d="M17 63 C61 14, 117 13, 165 49 C188 68, 204 64, 222 34" fill="none" stroke="#176b73" stroke-width="2" stroke-dasharray="6 5"/>
    <rect x="122" y="54" width="32" height="15" rx="3" fill="#475569" transform="rotate(22 138 61.5)"/>
    <circle cx="72" cy="40" r="7" fill="#2f6f4e"/>
    <text class="mono-small" x="18" y="113">n_min &lt;= n(s) &lt;= n_max</text>
  </g>

  <!-- Module labels -->
  <rect class="chip-rl" x="73" y="1015" width="234" height="24"/>
  <text class="chip-text" x="88" y="1032">Code sources: rl/, tactical_decision/</text>
  <rect class="chip-plan" x="323" y="1015" width="306" height="24"/>
  <text class="chip-text" x="338" y="1032">planner_cvxopt/src/traj_planner.cpp</text>
  <rect class="chip-ctrl" x="645" y="1015" width="260" height="24"/>
  <text class="chip-text" x="660" y="1032">controller/src/mpcc_func.cpp</text>
  <rect class="chip-ctrl" x="921" y="1015" width="253" height="24"/>
  <text class="chip-text" x="936" y="1032">controller/src/base_controller.cpp</text>
</svg>